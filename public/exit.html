<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111318">
<title>Before you go</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   Exit Intent Recovery — Results Generation
   Recover intent first. Monetize second. Entertain last.
   CEO: Dustin Hamilton · PI: Jacob E. Thomas, PhD
   ═══════════════════════════════════════════════════ */
:root {
  --bg: #111318;
  --surface: #1a1d24;
  --surface2: #22262f;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text: #eceef2;
  --text2: #b8bcc6;
  --dim: #6b7080;
  --faint: #3a3f4a;
  --blue: #4a90d9;
  --blue-glow: rgba(74,144,217,0.08);
  --green: #4a9e6e;
  --amber: #c4922a;
  --sage: #7a9e8e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased; overflow: hidden;
}

.app { height: 100dvh; width: 100%; position: relative; overflow: hidden; }

/* ─── Screens ─── */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 32px 24px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease;
}
.screen.active { opacity: 1; pointer-events: auto; }

/* ─── Screen 1: Recovery ─── */
.recovery-title {
  font-size: clamp(20px, 5vw, 28px); font-weight: 600;
  color: var(--text); margin-bottom: 8px; letter-spacing: -0.3px;
}
.recovery-sub {
  font-size: 14px; font-weight: 300; color: var(--dim);
  margin-bottom: 32px; line-height: 1.5;
}
.recovery-actions {
  display: flex; flex-direction: column; gap: 8px;
  width: 100%; max-width: 340px; margin-bottom: 28px;
}
.recovery-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px; font-size: 14px; font-weight: 500;
  color: var(--text); background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px;
  cursor: pointer; transition: all 0.25s;
  font-family: inherit; text-align: left;
}
.recovery-btn:hover {
  background: var(--surface2); border-color: var(--border2);
}
.recovery-btn:active { transform: scale(0.98); }
.recovery-btn .icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.recovery-btn .icon.blue { background: rgba(74,144,217,0.1); color: var(--blue); }
.recovery-btn .icon.green { background: rgba(74,158,110,0.1); color: var(--green); }
.recovery-btn .icon.amber { background: rgba(196,146,42,0.1); color: var(--amber); }

.recovery-secondary {
  display: flex; flex-direction: column; gap: 8px; align-items: center;
  margin-top: 8px;
}
.secondary-btn {
  font-size: 13px; font-weight: 400; color: var(--dim);
  background: none; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 20px; cursor: pointer; transition: all 0.25s;
  font-family: inherit;
}
.secondary-btn:hover { color: var(--text2); border-color: var(--border2); }
.leave-btn {
  font-size: 11px; font-weight: 300; color: var(--faint);
  background: none; border: none; cursor: pointer;
  margin-top: 8px; transition: color 0.2s; font-family: inherit;
}
.leave-btn:hover { color: var(--dim); }

/* ─── Screen 2: Reset (Breathing) ─── */
.reset-wrap { width: 100%; max-width: 320px; }
.reset-title {
  font-size: 16px; font-weight: 400; color: var(--text2);
  margin-bottom: 32px;
}
.breath-ring {
  width: 120px; height: 120px; border-radius: 50%;
  border: 2px solid var(--sage); margin: 0 auto 24px;
  opacity: 0.3; transform: scale(0.4);
}
.breath-ring.inhale {
  transform: scale(1); opacity: 0.8;
  transition: transform 3s cubic-bezier(0.4,0,0.2,1), opacity 3s ease;
}
.breath-ring.hold { transform: scale(1); opacity: 0.8; transition: none; }
.breath-ring.exhale {
  transform: scale(0.4); opacity: 0.3;
  transition: transform 4s cubic-bezier(0.4,0,0.2,1), opacity 4s ease;
}
.breath-phase {
  font-size: 15px; font-weight: 300; color: var(--dim);
  min-height: 24px; margin-bottom: 20px;
  opacity: 0; transition: opacity 0.5s ease;
}
.breath-phase.vis { opacity: 1; }
.breath-progress {
  display: flex; gap: 8px; justify-content: center; margin-bottom: 24px;
}
.breath-dot {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1px solid rgba(122,158,142,0.3); background: transparent;
  transition: all 0.5s ease;
}
.breath-dot.done { background: rgba(122,158,142,0.6); border-color: rgba(122,158,142,0.8); }
.skip-btn {
  font-size: 11px; font-weight: 300; color: var(--faint);
  background: none; border: none; cursor: pointer;
  font-family: inherit; transition: color 0.2s;
}
.skip-btn:hover { color: var(--dim); }

/* ─── Screen 3: Game ─── */
.game-title {
  font-size: 14px; font-weight: 400; color: var(--dim);
  margin-bottom: 20px;
}
.game-area { margin-bottom: 16px; }

/* ─── Screen 4: Re-entry ─── */
.reentry-title {
  font-size: clamp(18px, 4.5vw, 24px); font-weight: 500;
  color: var(--text); margin-bottom: 24px;
}
.reentry-primary {
  display: flex; flex-direction: column; gap: 8px;
  width: 100%; max-width: 300px; margin-bottom: 20px;
}
.reentry-btn {
  padding: 14px 20px; font-size: 14px; font-weight: 600;
  color: #fff; background: var(--blue);
  border: none; border-radius: 10px; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.reentry-btn:hover { background: #5a9de6; }
.reentry-btn:active { transform: scale(0.98); }
.reentry-btn.outline {
  background: transparent; color: var(--blue);
  border: 1px solid rgba(74,144,217,0.3);
}
.reentry-btn.outline:hover { background: rgba(74,144,217,0.06); }
.reentry-secondary {
  display: flex; gap: 16px; margin-top: 8px;
}

/* ─── Ad slot (light, non-intrusive) ─── */
.ad-slot {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 50px; background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--faint); letter-spacing: 0.5px;
}

@media (max-width: 480px) {
  .screen { padding: 24px 16px; }
  .recovery-btn { padding: 12px 14px; font-size: 13px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- SCREEN 1: EXIT INTENT RECOVERY -->
  <div class="screen active" id="screenRecovery">
    <div class="recovery-title">Not seeing the right jobs?</div>
    <div class="recovery-sub">Let us instantly improve your matches.</div>

    <div class="recovery-actions">
      <button class="recovery-btn" data-action="better">
        <div class="icon blue">&#9733;</div>
        <span>Show better matches</span>
      </button>
      <button class="recovery-btn" data-action="higher">
        <div class="icon green">&#8593;</div>
        <span>Higher paying jobs</span>
      </button>
      <button class="recovery-btn" data-action="remote">
        <div class="icon blue">&#9673;</div>
        <span>Remote jobs only</span>
      </button>
      <button class="recovery-btn" data-action="quick">
        <div class="icon amber">&#9889;</div>
        <span>Quick apply jobs</span>
      </button>
    </div>

    <div class="recovery-secondary">
      <button class="secondary-btn" id="resetBtn">Reset your job feed in 15 seconds</button>
      <button class="leave-btn" id="leaveBtn">Continue leaving</button>
    </div>
  </div>

  <!-- SCREEN 2: OPTIONAL RESET (BREATHING) -->
  <div class="screen" id="screenReset">
    <div class="reset-wrap">
      <div class="reset-title">Quick reset</div>
      <div class="breath-ring" id="breathRing"></div>
      <div class="breath-phase" id="breathPhase"></div>
      <div class="breath-progress" id="breathProgress"></div>
      <button class="skip-btn" id="skipReset">skip</button>
    </div>
  </div>

  <!-- SCREEN 3: OPTIONAL GAME -->
  <div class="screen" id="screenGame">
    <div class="game-title">Quick break — 15 seconds</div>
    <div class="game-area" id="gameArea"></div>
    <button class="skip-btn" id="skipGame">skip</button>
  </div>

  <!-- SCREEN 4: RE-ENTRY -->
  <div class="screen" id="screenReentry">
    <div class="reentry-title">Ready to find the right job?</div>
    <div class="reentry-primary">
      <button class="reentry-btn" data-action="find">Find jobs for me</button>
      <button class="reentry-btn outline" data-action="quick">Show quick apply jobs</button>
    </div>
    <div class="reentry-secondary">
      <button class="secondary-btn" id="playAgainBtn">Play again</button>
      <button class="leave-btn" id="exitBtn">Exit</button>
    </div>
  </div>

</div>

<!-- Light ad slot (Ezoic or house ad — non-intrusive) -->
<div class="ad-slot" id="adSlot">AD PLACEMENT — EZOIC BANNER</div>

<script>
(function () {
  'use strict';

  // ─── Screen management ──────────────────────────
  var screens = document.querySelectorAll('.screen');
  function goTo(id) {
    for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
    setTimeout(function () { document.getElementById(id).classList.add('active'); }, 200);
  }

  // ─── Notify parent frame of recovery actions ────
  function notifyParent(action) {
    try { window.parent.postMessage({ bmhi: 'refine', action: action }, '*'); } catch (e) {}
  }

  // ─── Screen 1: Recovery ─────────────────────────
  var recoveryBtns = document.querySelectorAll('.recovery-btn');
  for (var i = 0; i < recoveryBtns.length; i++) {
    recoveryBtns[i].addEventListener('click', function () {
      var action = this.getAttribute('data-action');
      notifyParent(action);
      goTo('screenReentry');
    });
  }

  document.getElementById('resetBtn').addEventListener('click', function () {
    goTo('screenReset');
    startBreathing();
  });

  document.getElementById('leaveBtn').addEventListener('click', function () {
    try { window.parent.postMessage({ bmhi: 'close' }, '*'); } catch (e) {}
    window.close();
  });

  // ─── Screen 2: Breathing ────────────────────────
  var INHALE = 3000, HOLD = 1000, EXHALE = 4000;
  var TOTAL = 2; // 2 breaths — quick reset
  var breathTimers = [];

  function startBreathing() {
    var ring = document.getElementById('breathRing');
    var phase = document.getElementById('breathPhase');
    var progress = document.getElementById('breathProgress');
    progress.innerHTML = '';

    var dots = [];
    for (var d = 0; d < TOTAL; d++) {
      var dot = document.createElement('div');
      dot.className = 'breath-dot';
      progress.appendChild(dot);
      dots.push(dot);
    }

    var count = 0;
    function setPhase(text) {
      phase.classList.remove('vis');
      setTimeout(function () { phase.textContent = text; phase.classList.add('vis'); }, 150);
    }

    function cycle() {
      ring.className = 'breath-ring inhale';
      setPhase('breathe in');

      breathTimers.push(setTimeout(function () {
        ring.className = 'breath-ring hold';
        setPhase('hold');
      }, INHALE));

      breathTimers.push(setTimeout(function () {
        ring.className = 'breath-ring exhale';
        setPhase('breathe out');
      }, INHALE + HOLD));

      breathTimers.push(setTimeout(function () {
        if (count < dots.length) {
          dots[count].classList.add('done');
        }
        count++;
        if (count >= TOTAL) {
          finishBreathing();
        } else {
          cycle();
        }
      }, INHALE + HOLD + EXHALE));
    }

    setTimeout(cycle, 400);
  }

  function finishBreathing() {
    for (var t = 0; t < breathTimers.length; t++) clearTimeout(breathTimers[t]);
    breathTimers = [];
    goTo('screenGame');
    startGame();
  }

  document.getElementById('skipReset').addEventListener('click', function () {
    for (var t = 0; t < breathTimers.length; t++) clearTimeout(breathTimers[t]);
    breathTimers = [];
    goTo('screenGame');
    startGame();
  });

  // ─── Screen 3: Quick Game ───────────────────────
  var gameRaf = null;
  var gameTimeout = null;

  function startGame() {
    var area = document.getElementById('gameArea');
    area.innerHTML = '';

    // Simple pattern match — 3x2 grid, 3 pairs
    var symbols = [
      { s: '\u25C6', c: '#c4922a' },
      { s: '\u25CF', c: '#7a9e8e' },
      { s: '\u25B2', c: '#4a90d9' }
    ];
    var deck = [];
    for (var i = 0; i < symbols.length; i++) {
      deck.push({ id: i, s: symbols[i].s, c: symbols[i].c });
      deck.push({ id: i, s: symbols[i].s, c: symbols[i].c });
    }
    // Shuffle
    for (var j = deck.length - 1; j > 0; j--) {
      var k = Math.floor(Math.random() * (j + 1));
      var tmp = deck[j]; deck[j] = deck[k]; deck[k] = tmp;
    }

    var grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:220px;margin:0 auto;';

    var flipped = [], locked = false, matched = 0;

    for (var c = 0; c < deck.length; c++) {
      (function (idx) {
        var card = document.createElement('div');
        card.style.cssText =
          'aspect-ratio:1;border-radius:8px;background:var(--surface);' +
          'border:1px solid var(--border);cursor:pointer;display:flex;' +
          'align-items:center;justify-content:center;font-size:24px;' +
          'transition:all 0.2s;user-select:none;';
        var face = document.createElement('span');
        face.style.cssText = 'opacity:0;transition:opacity 0.2s;color:' + deck[idx].c;
        face.textContent = deck[idx].s;
        card.appendChild(face);

        card.addEventListener('click', function () {
          if (locked || card.dataset.flipped || card.dataset.matched) return;
          card.dataset.flipped = '1';
          card.style.background = 'var(--surface2)';
          card.style.borderColor = 'var(--border2)';
          face.style.opacity = '1';
          flipped.push({ card: card, face: face, id: deck[idx].id });

          if (flipped.length === 2) {
            locked = true;
            var a = flipped[0], b = flipped[1];
            if (a.id === b.id) {
              setTimeout(function () {
                a.card.dataset.matched = '1';
                b.card.dataset.matched = '1';
                a.card.style.opacity = '0.4';
                b.card.style.opacity = '0.4';
                matched++;
                flipped = [];
                locked = false;
                if (matched >= symbols.length) finishGame();
              }, 300);
            } else {
              setTimeout(function () {
                delete a.card.dataset.flipped;
                delete b.card.dataset.flipped;
                a.card.style.background = 'var(--surface)';
                b.card.style.background = 'var(--surface)';
                a.card.style.borderColor = 'var(--border)';
                b.card.style.borderColor = 'var(--border)';
                a.face.style.opacity = '0';
                b.face.style.opacity = '0';
                flipped = [];
                locked = false;
              }, 600);
            }
          }
        });

        grid.appendChild(card);
      })(c);
    }

    area.appendChild(grid);

    // Auto-complete after 15 seconds
    gameTimeout = setTimeout(finishGame, 15000);
  }

  function finishGame() {
    if (gameTimeout) { clearTimeout(gameTimeout); gameTimeout = null; }
    goTo('screenReentry');
  }

  document.getElementById('skipGame').addEventListener('click', function () {
    if (gameTimeout) { clearTimeout(gameTimeout); gameTimeout = null; }
    goTo('screenReentry');
  });

  // ─── Screen 4: Re-entry ─────────────────────────
  var reentryBtns = document.querySelectorAll('.reentry-btn');
  for (var r = 0; r < reentryBtns.length; r++) {
    reentryBtns[r].addEventListener('click', function () {
      var action = this.getAttribute('data-action');
      notifyParent(action);
      // Close the overlay (tell parent to dismiss)
      try { window.parent.postMessage({ bmhi: 'close' }, '*'); } catch (e) {}
    });
  }

  document.getElementById('playAgainBtn').addEventListener('click', function () {
    goTo('screenGame');
    startGame();
  });

  document.getElementById('exitBtn').addEventListener('click', function () {
    try { window.parent.postMessage({ bmhi: 'close' }, '*'); } catch (e) {}
    window.close();
  });

})();
</script>
</body>
</html>
