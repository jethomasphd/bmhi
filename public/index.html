<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1612">
<title>BMHI — Brief Mental Health Intervention Suite</title>
<meta name="description" content="Evidence-based micro-interventions for job seekers. A population-level behavioral health touchpoint grounded in 30+ years of peer-reviewed research.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   BMHI — Brief Mental Health Intervention Suite
   Visual Design System per Seed.md §5
   Museum-quality. Mobile-first. Every pixel honors the weight.
   ═══════════════════════════════════════════════════════════════ */
:root {
  --bg: #1a1612;
  --bg2: #1f1b16;
  --bg3: #252019;
  --surface: #2a241c;
  --surface2: #322b22;
  --border: rgba(240,236,228,0.07);
  --border2: rgba(240,236,228,0.12);
  --text: #f0ece4;
  --text2: #d4cfc5;
  --dim: #9a9384;
  --faint: #5a554a;
  --amber: #c4922a;
  --amber-glow: rgba(196,146,42,0.08);
  --amber-dim: rgba(196,146,42,0.12);
  --sage: #7a9e8e;
  --sage-glow: rgba(122,158,142,0.08);
  --water: #6a8fa7;
  --clay: #b8856e;
  --rose: #b07a7a;
  --plum: #8e7299;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--sans); -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
::selection { background: rgba(196,146,42,0.25); color: var(--text); }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }

/* ─── APP SHELL ─── */
.app { height: 100dvh; width: 100%; position: relative; overflow: hidden; }

/* ─── DISMISS BUTTON (always visible per §4.3) ─── */
.dismiss {
  position: fixed; top: 16px; right: 16px; z-index: 200;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(26,22,18,0.6); border: 1px solid var(--border);
  color: var(--faint); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease; backdrop-filter: blur(8px);
  opacity: 0; pointer-events: none;
  -webkit-tap-highlight-color: transparent;
}
.dismiss.vis { opacity: 1; pointer-events: auto; }
.dismiss:hover, .dismiss:active { color: var(--text); border-color: var(--border2); }

/* ─── STAGE SYSTEM ─── */
.stage {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 40px 28px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.8s ease;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.stage.active { opacity: 1; pointer-events: auto; }

/* Intervention container needs positioning context for overlays */
#interventionContent {
  position: relative; width: 100%; max-width: 560px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 60vh;
}

/* (suite nav is now an on-demand modal; no persistent bottom bar) */

/* ─── WELCOME SCREEN (first visit) ─── */
.welcome { overflow: hidden; }
.welcome-title {
  font-family: var(--serif); font-size: clamp(26px, 7vw, 40px);
  font-weight: 300; color: var(--text); line-height: 1.3;
  letter-spacing: -0.3px; margin-bottom: 16px;
  opacity: 0; animation: welcomeFade 1s ease 0.3s forwards;
}
.welcome-sub {
  font-family: var(--serif); font-size: clamp(16px, 4vw, 22px);
  font-weight: 300; font-style: italic; color: var(--dim);
  line-height: 1.5; margin-bottom: 48px;
  opacity: 0; animation: welcomeFade 1s ease 0.8s forwards;
}
.welcome-btn {
  font-family: var(--serif); font-size: 17px; font-weight: 400;
  font-style: italic; color: var(--amber);
  background: rgba(196,146,42,0.06);
  border: 1px solid rgba(196,146,42,0.3);
  border-radius: 28px; cursor: pointer; letter-spacing: 0.5px;
  padding: 16px 40px;
  transition: all 0.3s ease;
  opacity: 0; animation: welcomeFade 1s ease 1.2s forwards;
}
.welcome-btn:hover {
  color: var(--text); background: rgba(196,146,42,0.12);
  border-color: rgba(196,146,42,0.5);
}
.welcome-btn:active { transform: scale(0.96); }
.welcome.exiting {
  opacity: 0; transition: opacity 0.6s ease;
}
@keyframes welcomeFade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── POST-COMPLETION REVEAL ─── */
.post-reveal {
  opacity: 0; pointer-events: none;
  transition: opacity 1s ease;
  text-align: center; padding: 20px 28px 0;
}
.post-reveal.vis { opacity: 1; pointer-events: auto; }
.post-reveal-more {
  font-family: var(--serif); font-size: 14px; font-weight: 300;
  font-style: italic; color: var(--dim); margin-bottom: 12px;
}
.post-reveal-why {
  font-family: var(--serif); font-size: 14px; font-weight: 400;
  font-style: italic; color: var(--amber);
  text-decoration: none; transition: color 0.3s;
}
.post-reveal-why:hover { color: var(--text); }

/* ─── ABOUT LINK ─── */
.about-link {
  font-family: var(--mono); font-size: 9px; font-weight: 400;
  letter-spacing: 0.8px; color: var(--faint);
  background: none; border: none; cursor: pointer;
  text-decoration: none; transition: color 0.3s;
  display: inline-flex; align-items: center; gap: 4px;
}
.about-link:hover { color: var(--amber); }

/* ─── BREATH PACER (A1) ─── */
.breath-circle {
  width: 120px; height: 120px; border-radius: 50%;
  border: 2px solid var(--sage);
  opacity: 0.3; transform: scale(0.4);
  transition: none;
  margin-bottom: 40px;
  position: relative;
}
.breath-circle::after {
  content: ''; position: absolute; inset: 8px;
  border-radius: 50%; border: 1px solid rgba(122,158,142,0.3);
}
.breath-circle.inhale {
  transform: scale(1); opacity: 0.8;
  transition: transform 3s cubic-bezier(0.4,0,0.2,1), opacity 3s ease;
}
.breath-circle.hold {
  transform: scale(1); opacity: 0.8;
  transition: none;
}
.breath-circle.exhale {
  transform: scale(0.4); opacity: 0.3;
  transition: transform 4s cubic-bezier(0.4,0,0.2,1), opacity 4s ease;
}

.breath-label {
  font-family: var(--serif);
  font-size: clamp(18px, 5vw, 22px);
  font-weight: 400;
  font-style: italic; color: var(--text2); opacity: 0;
  transition: opacity 1s ease; min-height: 32px;
  letter-spacing: 0.2px;
  padding: 0 16px;
}
.breath-label.vis { opacity: 1; }

.breath-closing {
  font-family: var(--serif);
  font-size: clamp(18px, 5vw, 22px);
  font-weight: 400;
  color: var(--text); opacity: 0;
  transition: opacity 1.5s ease; margin-top: 32px;
  line-height: 1.4; padding: 0 16px;
}
.breath-closing.vis { opacity: 1; }

/* ─── BODY SCAN (A2) ─── */
.scan-text {
  font-family: var(--serif); font-size: clamp(20px, 5vw, 28px);
  font-weight: 300; font-style: italic; color: var(--text2);
  line-height: 1.4; opacity: 0; min-height: 44px;
  transition: opacity 1.5s ease;
}
.scan-text.vis { opacity: 1; }

/* ─── TWO-MINUTE RESET (A3) ─── */
.reset-timer {
  font-family: var(--mono); font-size: clamp(48px, 12vw, 72px);
  font-weight: 300; color: var(--text); letter-spacing: 4px;
  margin-bottom: 24px;
}
.sound-btns {
  display: flex; gap: 12px; margin-bottom: 32px;
}
.sound-btn {
  font-family: var(--sans); font-size: 11px; font-weight: 400;
  color: var(--faint); background: transparent;
  border: 1px solid var(--border); border-radius: 18px;
  padding: 8px 18px; cursor: pointer;
  transition: all 0.3s ease; letter-spacing: 0.3px;
}
.sound-btn.active { color: var(--amber); border-color: rgba(196,146,42,0.3); }
.sound-btn:hover { color: var(--dim); }

/* ─── DATA REFRAME (B1) ─── */
.reframe-card {
  max-width: 480px; text-align: left; padding: 0 8px;
}
.reframe-card .rf-note {
  font-family: var(--serif); font-size: 14px; font-style: italic;
  color: var(--faint); margin-bottom: 20px;
}
.reframe-card .rf-body {
  font-family: var(--serif); font-size: clamp(18px, 4vw, 24px);
  font-weight: 300; color: var(--text2); line-height: 1.7;
  margin-bottom: 24px;
}
.reframe-card .rf-body em {
  color: var(--text); font-style: normal; font-weight: 500;
}
.reframe-card .rf-stat {
  font-family: var(--mono); font-size: clamp(32px, 8vw, 48px);
  font-weight: 300; color: var(--amber); margin-bottom: 20px;
  letter-spacing: -1px;
}
.reframe-card .rf-source {
  font-family: var(--mono); font-size: 9px; color: var(--faint);
  letter-spacing: 0.5px; margin-top: 16px;
}
.reframe-card .rf-close {
  font-family: var(--serif); font-size: 20px; font-weight: 400;
  color: var(--text); line-height: 1.5; margin-top: 24px;
  font-style: italic;
}

/* ─── DEFUSION (B2) ─── */
.defusion-thoughts {
  display: flex; flex-direction: column; gap: 10px;
  max-width: 380px; width: 100%; margin-bottom: 24px;
}
.thought-btn {
  font-family: var(--serif); font-size: 16px; font-weight: 300;
  font-style: italic; color: var(--dim);
  background: transparent; border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 20px; cursor: pointer;
  text-align: left; transition: all 0.3s ease; line-height: 1.4;
}
.thought-btn:hover { border-color: var(--border2); color: var(--text2); }
.thought-btn:active { transform: scale(0.98); }
.thought-btn.selected {
  border-color: rgba(196,146,42,0.3); color: var(--text);
  background: rgba(196,146,42,0.04);
}

/* ─── TEXT INPUT SHARED ─── */
.mhi-input {
  width: 100%; max-width: 420px;
  font-family: var(--serif); font-size: 18px; font-weight: 300;
  color: var(--text); background: transparent;
  border: none; border-bottom: 1px solid var(--border);
  padding: 14px 4px; outline: none;
  caret-color: var(--amber); text-align: center;
  transition: border-color 0.4s ease;
}
.mhi-input:focus { border-bottom-color: rgba(196,146,42,0.4); }
.mhi-input::placeholder { color: var(--faint); font-style: italic; }

.mhi-textarea {
  width: 100%; max-width: 480px; min-height: 140px;
  font-family: var(--serif); font-size: 18px; font-weight: 300;
  color: var(--text); background: rgba(42,36,28,0.5);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; outline: none; resize: none;
  caret-color: var(--amber); line-height: 1.7;
  transition: border-color 0.4s ease, opacity 2s ease;
}
.mhi-textarea:focus { border-color: rgba(196,146,42,0.2); }
.mhi-textarea::placeholder { color: var(--faint); font-style: italic; }
.mhi-textarea.dissolving {
  opacity: 0; transform: scale(0.98); filter: blur(4px);
  transition: opacity 3s ease, transform 3s ease, filter 3s ease;
}

/* ─── ACTION BUTTONS ─── */
.action-chips {
  display: flex; flex-direction: column; gap: 10px;
  max-width: 380px; width: 100%;
}
.action-chip {
  font-family: var(--sans); font-size: 14px; font-weight: 400;
  color: var(--text2); background: transparent;
  border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 20px; cursor: pointer; text-align: left;
  transition: all 0.3s ease; line-height: 1.4;
}
.action-chip:hover { border-color: var(--border2); }
.action-chip:active { transform: scale(0.98); }
.action-chip.selected {
  border-color: rgba(122,158,142,0.4); color: var(--sage);
  background: rgba(122,158,142,0.04);
}

/* ─── LET IT GO BUTTON ─── */
.letgo-btn {
  font-family: var(--serif); font-size: 16px; font-weight: 400;
  font-style: italic; color: var(--amber);
  background: rgba(196,146,42,0.06);
  border: 1px solid rgba(196,146,42,0.3);
  border-radius: 24px; padding: 14px 32px;
  cursor: pointer; opacity: 0; pointer-events: none;
  transition: opacity 1s ease, background 0.3s, border-color 0.3s;
}
.letgo-btn.vis { opacity: 1; pointer-events: auto; }
.letgo-btn:hover { background: rgba(196,146,42,0.12); border-color: rgba(196,146,42,0.5); }

/* ─── EMOJI SCALE (F1) ─── */
.emoji-scale {
  display: flex; gap: 16px; margin: 24px 0;
}
.emoji-btn {
  width: 52px; height: 52px; border-radius: 50%;
  background: transparent; border: 1px solid var(--border);
  font-size: 24px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease;
}
.emoji-btn:hover { border-color: var(--border2); transform: scale(1.1); }
.emoji-btn:active { transform: scale(0.95); }
.emoji-btn.selected {
  border-color: var(--amber); background: rgba(196,146,42,0.08);
  transform: scale(1.15);
}

/* ─── REFERRAL CARD ─── */
.referral-card {
  max-width: 380px; width: 100%; text-align: left;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-top: 24px;
  opacity: 0; transition: opacity 1s ease;
}
.referral-card.vis { opacity: 1; }
.referral-card .ref-intro {
  font-family: var(--serif); font-size: 14px; font-style: italic;
  color: var(--dim); margin-bottom: 16px; line-height: 1.6;
}
.referral-link {
  display: block; padding: 12px 16px;
  background: rgba(196,146,42,0.04); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 8px; text-decoration: none;
  transition: all 0.3s ease; color: var(--text2);
}
.referral-link:hover { border-color: var(--border2); background: rgba(196,146,42,0.08); }
.referral-link .ref-name {
  font-size: 13px; font-weight: 500; margin-bottom: 2px;
}
.referral-link .ref-detail {
  font-family: var(--mono); font-size: 11px; color: var(--amber);
}

/* ─── POPULATION MIRROR (F2) ─── */
.pop-number {
  font-family: var(--mono); font-size: clamp(36px, 9vw, 56px);
  font-weight: 300; color: var(--amber); letter-spacing: 2px;
  margin: 20px 0 24px;
}

/* ─── PATTERN MATCH GAME (E1) ─── */
.match-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px; max-width: 280px; margin: 0 auto 24px;
}
.match-card {
  aspect-ratio: 1; border-radius: 10px;
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 28px;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
}
.match-card.flipped {
  background: var(--surface2); border-color: var(--border2);
}
.match-card.matched {
  background: rgba(122,158,142,0.08);
  border-color: rgba(122,158,142,0.3);
  opacity: 0.6;
}
.match-card:active { transform: scale(0.95); }

/* ─── CANVAS (E2) ─── */
.canvas-wrap {
  position: relative; max-width: 340px; width: 100%;
  margin: 0 auto 20px;
}
.draw-canvas {
  width: 100%; aspect-ratio: 4/3; border-radius: 12px;
  background: var(--surface); border: 1px solid var(--border);
  cursor: crosshair; touch-action: none;
}
.color-picks {
  display: flex; gap: 10px; justify-content: center; margin-top: 12px;
}
.color-pick {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: all 0.2s;
}
.color-pick.active { border-color: var(--text); transform: scale(1.2); }

/* ─── PROGRESS MAP (B4) ─── */
.progress-bar-wrap {
  display: flex; gap: 6px; align-items: flex-end;
  justify-content: center; margin: 24px 0;
  max-width: 360px; width: 100%;
}
.progress-pip {
  flex: 1; max-width: 40px; border-radius: 4px 4px 0 0;
  background: var(--surface2); transition: all 0.6s ease;
  min-height: 20px;
}
.progress-pip.current {
  background: var(--amber);
}
.progress-pip.past {
  background: rgba(196,146,42,0.3);
}

/* ─── PROMPT TEXT (shared) ─── */
.prompt-text {
  font-family: var(--serif); font-size: clamp(16px, 4vw, 22px);
  font-weight: 300; color: var(--text2); line-height: 1.6;
  max-width: 480px; margin-bottom: 24px;
}
.prompt-text em { color: var(--text); font-style: normal; font-weight: 400; }

.closing-text {
  font-family: var(--serif); font-size: clamp(16px, 4vw, 22px);
  font-weight: 400; color: var(--text); line-height: 1.5;
  max-width: 440px; opacity: 0; transition: opacity 1.5s ease;
}
.closing-text.vis { opacity: 1; }

.privacy-note {
  font-size: 11px; font-weight: 300; color: var(--faint);
  margin-bottom: 20px; max-width: 360px;
  letter-spacing: 0.2px; line-height: 1.6;
}

/* ─── USER ECHO (their words displayed back) ─── */
.user-echo {
  font-family: var(--serif); font-size: clamp(22px, 5.5vw, 32px);
  font-weight: 400; color: var(--text); line-height: 1.4;
  max-width: 480px; margin-bottom: 24px;
  word-break: break-word;
}

/* ─── CONFIRMATION ANIMATION ─── */
.confirm-anim {
  width: 60px; height: 60px; margin-bottom: 20px;
}
.confirm-anim .check-path {
  stroke-dasharray: 60; stroke-dashoffset: 60;
  transition: stroke-dashoffset 0.6s ease 0.2s;
}
.confirm-anim.done .check-path { stroke-dashoffset: 0; }

/* ─── ALL-RESETS MODAL ─── */
.nav-modal {
  position: fixed; inset: 0; z-index: 300;
  display: flex; align-items: flex-end; justify-content: center;
  background: rgba(10,8,6,0);
  backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
  pointer-events: none;
  transition: background 0.3s ease, backdrop-filter 0.3s ease;
}
.nav-modal.open {
  pointer-events: auto;
  background: rgba(10,8,6,0.7);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}

.nav-modal-sheet {
  width: 100%; max-width: 520px;
  max-height: 82vh; overflow-y: auto;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  padding: 22px 22px 32px;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  -webkit-overflow-scrolling: touch;
}
.nav-modal.open .nav-modal-sheet { transform: translateY(0); }
@media (min-width: 768px) {
  .nav-modal { align-items: center; }
  .nav-modal-sheet {
    max-height: 78vh;
    border-radius: 20px;
    padding: 28px 28px 32px;
  }
}

.nav-modal-head {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 14px; margin-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.nav-modal-title {
  font-family: var(--serif); font-size: 20px; font-weight: 500;
  color: var(--text); letter-spacing: -0.2px;
}
.nav-modal-close {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border2); background: transparent;
  color: var(--dim); font-size: 20px; line-height: 1;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: color 0.2s, border-color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.nav-modal-close:hover { color: var(--text); border-color: var(--border2); }

.nav-modal-foot {
  margin-top: 20px; padding-top: 12px; border-top: 1px solid var(--border);
  text-align: center;
}

.nav-list { display: flex; flex-direction: column; gap: 18px; }
.nav-tier {
  display: flex; flex-direction: column; gap: 2px;
}
.nav-tier-heading {
  font-family: var(--mono); font-size: 10px; letter-spacing: 1.3px;
  text-transform: uppercase; color: var(--dim);
  padding: 6px 6px 6px; margin-bottom: 2px;
}
.nav-tier[data-tier="a"] .nav-tier-heading { color: var(--sage); }
.nav-tier[data-tier="b"] .nav-tier-heading { color: var(--water); }
.nav-tier[data-tier="c"] .nav-tier-heading { color: var(--clay); }
.nav-tier[data-tier="d"] .nav-tier-heading { color: var(--rose); }
.nav-tier[data-tier="e"] .nav-tier-heading { color: var(--plum); }
.nav-tier[data-tier="f"] .nav-tier-heading { color: var(--amber); }

.nav-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 14px; border-radius: 10px;
  cursor: pointer; border: 1px solid transparent; background: transparent;
  color: var(--text2);
  font-family: var(--sans); font-size: 15px; font-weight: 500;
  text-align: left; width: 100%;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.nav-item:hover { background: rgba(240,236,228,0.04); color: var(--text); border-color: var(--border); }
.nav-item:active { background: rgba(240,236,228,0.08); }
.nav-item-name { font-weight: 500; }
.nav-item-time {
  font-family: var(--mono); font-size: 11px; font-weight: 400;
  color: var(--faint); letter-spacing: 0.3px;
}

/* ─── POST-INTERVENTION ─── */
.post-intervention {
  max-width: 440px; width: 100%; opacity: 0;
  transition: opacity 1s ease 0.5s; text-align: center;
}
.post-intervention.vis { opacity: 1; }
.post-cta {
  font-family: var(--serif); font-size: 14px; font-style: italic;
  color: var(--dim); margin-bottom: 16px; line-height: 1.6;
}
.post-link {
  display: inline-block; font-family: var(--sans); font-size: 12px;
  font-weight: 500; color: var(--amber);
  border: 1px solid rgba(196,146,42,0.3); border-radius: 20px;
  padding: 10px 24px; text-decoration: none; cursor: pointer;
  background: transparent; transition: all 0.3s ease;
}
.post-link:hover { background: rgba(196,146,42,0.08); border-color: rgba(196,146,42,0.5); }

/* ─── JOBS CTA — persistent, escalates at post ─── */
.jobs-cta {
  position: fixed; top: 16px; left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  letter-spacing: 0.3px; color: var(--text2);
  background: rgba(26,22,18,0.7); backdrop-filter: blur(8px);
  border: 1px solid rgba(196,146,42,0.22);
  border-radius: 20px; padding: 9px 18px;
  text-decoration: none; cursor: pointer;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease, color 0.3s, border-color 0.3s, background 0.3s, transform 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.jobs-cta.vis { opacity: 1; pointer-events: auto; }
.jobs-cta:hover {
  color: var(--amber);
  border-color: rgba(196,146,42,0.45);
  background: rgba(196,146,42,0.08);
}
.jobs-cta:active { transform: translateX(-50%) scale(0.97); }
.jobs-cta.loud {
  color: var(--amber);
  border-color: rgba(196,146,42,0.5);
  background: rgba(196,146,42,0.12);
  font-size: 13px; padding: 11px 22px;
  font-weight: 600;
  box-shadow: 0 2px 14px rgba(196,146,42,0.18);
}
.jobs-cta.loud:hover {
  color: var(--text);
  background: rgba(196,146,42,0.18);
  border-color: rgba(196,146,42,0.65);
}
@media (max-width: 480px) {
  .jobs-cta { font-size: 11px; padding: 8px 14px; }
  .jobs-cta.loud { font-size: 12px; padding: 10px 18px; }
}

/* ─── POST-INTERVENTION IN-FLOW UI ─── */
.post-wrap {
  max-width: 420px; width: 100%;
  display: flex; flex-direction: column; align-items: center;
  gap: 14px; padding: 8px 4px 40px;
  animation: fadeUp 0.6s ease 0.1s both;
}
.post-head {
  font-family: var(--serif); font-size: clamp(22px, 5vw, 28px);
  font-weight: 400; color: var(--text);
  line-height: 1.25; letter-spacing: -0.3px;
}
.post-sub {
  font-family: var(--serif); font-size: clamp(14px, 3.5vw, 16px);
  font-weight: 300; font-style: italic; color: var(--dim);
  line-height: 1.5; margin-bottom: 12px;
}
.post-primary {
  font-family: var(--sans); font-size: 15px; font-weight: 600;
  letter-spacing: 0.2px; color: #1a1612;
  background: var(--amber); border: 1px solid var(--amber);
  border-radius: 28px; padding: 16px 32px;
  cursor: pointer; transition: all 0.25s ease;
  box-shadow: 0 4px 24px rgba(196,146,42,0.25);
  -webkit-tap-highlight-color: transparent;
  max-width: 360px; width: 100%;
}
.post-primary:hover {
  background: #d9a23a;
  box-shadow: 0 6px 32px rgba(196,146,42,0.35);
  transform: translateY(-1px);
}
.post-primary:active { transform: translateY(0) scale(0.98); }
.post-secondary {
  font-family: var(--serif); font-size: 14px; font-weight: 400;
  font-style: italic; color: var(--dim);
  background: transparent; border: none;
  padding: 8px 12px; cursor: pointer;
  transition: color 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.post-secondary:hover { color: var(--text2); }
.post-explore {
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: 0.4px; color: var(--faint);
  background: transparent; border: none;
  padding: 10px 12px; margin-top: 4px;
  cursor: pointer; transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
  text-transform: uppercase;
}
.post-explore:hover { color: var(--dim); }

/* ─── SPONSORED PARTNER SLOT ─── */
.bmhi-ad {
  position: relative;
  width: 100%; max-width: 360px;
  margin-top: 28px;
  padding: 18px 20px 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  text-align: left;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
}
.bmhi-ad[data-tint="sage"]  { border-left: 2px solid rgba(122,158,142,0.45); }
.bmhi-ad[data-tint="water"] { border-left: 2px solid rgba(106,143,167,0.45); }
.bmhi-ad[data-tint="amber"] { border-left: 2px solid rgba(196,146,42,0.45); }
.bmhi-ad-tag {
  font-family: var(--mono); font-size: 9px; font-weight: 400;
  letter-spacing: 1.1px; text-transform: uppercase;
  color: var(--faint); margin-bottom: 10px;
}
.bmhi-ad-dismiss {
  position: absolute; top: 8px; right: 8px;
  width: 26px; height: 26px; border-radius: 50%;
  background: transparent; border: none;
  color: var(--faint); font-size: 16px; line-height: 1;
  cursor: pointer; transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.bmhi-ad-dismiss:hover { color: var(--text2); }
.bmhi-ad-brand {
  font-family: var(--serif); font-size: 18px; font-weight: 500;
  color: var(--text); margin-bottom: 4px; letter-spacing: -0.2px;
}
.bmhi-ad-tagline {
  font-family: var(--sans); font-size: 13px; font-weight: 400;
  color: var(--text2); line-height: 1.45; margin-bottom: 6px;
}
.bmhi-ad-detail {
  font-family: var(--sans); font-size: 12px; font-weight: 300;
  color: var(--dim); line-height: 1.5; margin-bottom: 12px;
}
.bmhi-ad-cta {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  letter-spacing: 0.2px; color: var(--amber);
  text-decoration: none;
  padding: 6px 0; transition: color 0.2s;
}
.bmhi-ad-cta:hover { color: var(--text); }

/* ─── AMBIENT AUDIO CONTROLS ─── */
.audio-toggle {
  position: fixed; top: 16px; left: 16px; z-index: 200;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(26,22,18,0.6); border: 1px solid var(--border);
  color: var(--faint); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease; backdrop-filter: blur(8px);
  opacity: 0; pointer-events: none;
  -webkit-tap-highlight-color: transparent;
}
.audio-toggle.vis { opacity: 1; pointer-events: auto; }
.audio-toggle.on { color: var(--amber); border-color: rgba(196,146,42,0.3); }
.audio-toggle:active { color: var(--amber); }

/* ─── KEYFRAMES ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: none; }
}
@keyframes pulse-soft {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
@keyframes float-up {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-40px); }
}

/* ─── NOISE OVERLAY ─── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.3;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 480px) {
  .stage { padding: 28px 16px; }
  .emoji-scale { gap: 8px; }
  .emoji-btn { width: 52px; height: 52px; font-size: 24px; }
  .match-grid { gap: 6px; max-width: min(280px, 85vw); }
  .mhi-input { font-size: 16px; } /* prevents iOS zoom on focus */
  .mhi-textarea { font-size: 16px; } /* prevents iOS zoom on focus */
  .breath-circle { width: 100px; height: 100px; }
  .prompt-text { font-size: clamp(16px, 4.5vw, 18px); }
  .post-head { font-size: clamp(20px, 5.5vw, 24px); }
  .post-sub  { font-size: clamp(13px, 3.8vw, 15px); }
  .post-primary { font-size: 15px; padding: 15px 24px; }
  .nav-item { font-size: 14px; padding: 14px 12px; }
  .nav-modal-title { font-size: 18px; }
}
@media (max-width: 360px) {
  .stage { padding: 24px 14px; }
}
@media (min-width: 768px) {
  .stage { padding: 48px 40px; }
}

/* ─── REDUCED MOTION ─── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
  .welcome-title, .welcome-sub, .welcome-btn,
  .breath-circle,
  .breath-label, .closing-text, .dismiss, .audio-toggle {
    opacity: 1 !important;
    transform: none !important;
    animation: none !important;
  }
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- DISMISS — always visible per §4.3 -->
  <button class="dismiss" id="dismissBtn" aria-label="Close">&times;</button>

  <!-- JOBS CTA — persistent; refreshes feed with a generic query -->
  <button class="jobs-cta" id="jobsCta" type="button" aria-label="Back to job search">
    <span id="jobsCtaLabel">show me better matches &rarr;</span>
  </button>

  <!-- AUDIO TOGGLE — §4.8: never autoplay -->
  <button class="audio-toggle" id="audioToggle" aria-label="Toggle ambient sound">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M11 5L6 9H2v6h4l5 4V5z"/>
      <path class="audio-waves" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" opacity="0.4"/>
    </svg>
  </button>

<!-- ═══════════════════════════════════════════
     WELCOME — the hand on the shoulder (first visit)
     ═══════════════════════════════════════════ -->
  <div class="stage welcome active" id="stageWelcome">
    <div class="welcome-title" id="welcomeTitle">Before you go.</div>
    <div class="welcome-sub" id="welcomeSub">You searched today. That counts.</div>
    <button class="welcome-btn" id="welcomeBtn">Take a breath</button>
  </div>

  <!-- ═══════════════════════════════════════════
       INTERVENTION STAGE — all interventions render here
       ═══════════════════════════════════════════ -->
  <div class="stage" id="stageIntervention" role="main" aria-live="polite">
    <div id="interventionContent"></div>
  </div>

  <!-- ═══════════════════════════════════════════
       POST-INTERVENTION
       ═══════════════════════════════════════════ -->
  <div class="stage" id="stagePost">
    <div id="postContent"></div>
  </div>

</div><!-- .app -->

<!-- POST-COMPLETION REVEAL (first visit) -->
<div class="post-reveal" id="postReveal">
  <div class="post-reveal-more">There's more here if you want it.</div>
  <a href="about.html" class="post-reveal-why">Why does this work?</a>
</div>

<!-- ALL-RESETS MODAL (hidden until user taps "See all resets") -->
<div class="nav-modal" id="suiteNav" aria-hidden="true">
  <div class="nav-modal-sheet" role="dialog" aria-label="All resets">
    <div class="nav-modal-head">
      <div class="nav-modal-title">All resets</div>
      <button class="nav-modal-close" id="suiteNavClose" type="button" aria-label="Close">&times;</button>
    </div>
    <div class="nav-list" id="navList"></div>
    <div class="nav-modal-foot">
      <a href="about.html" class="about-link">why this works</a>
    </div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="interventions/a1-breath-pacer.js"></script>
<script src="interventions/a2-body-scan.js"></script>
<script src="interventions/a3-two-minute-reset.js"></script>

<script src="interventions/b2-defusion.js"></script>
<script src="interventions/c1-one-small-thing.js"></script>
<script src="interventions/c3-network-nudge.js"></script>
<script src="interventions/d1-release.js"></script>
<script src="interventions/d2-self-compassion.js"></script>
<script src="interventions/d3-gratitude.js"></script>
<script src="interventions/e1-pattern-match.js"></script>
<script src="interventions/e3-tetris.js"></script>
<script src="interventions/e4-snake.js"></script>
<script src="interventions/e5-breaker.js"></script>
<script src="interventions/e6-garden.js"></script>
<script src="interventions/f1-checkin.js"></script>
<script src="interventions/f2-population-mirror.js"></script>
<script src="ads.js"></script>
<script src="app.js"></script>
</body>
